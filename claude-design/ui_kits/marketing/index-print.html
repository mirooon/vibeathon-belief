<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>LI.FI — Marketing (Print)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html,body{margin:0;background:#000;color:#F4F4F5;font-family:var(--font-body)}
  *{box-sizing:border-box}

  @page { size: 1280px 1800px; margin: 0; }
  @media print {
    html, body { background:#000 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    a { color: inherit; text-decoration: none; }
    button { box-shadow: none !important; }
    section, footer { break-inside: avoid; }
  }
</style>
</head>
<body>
<div id="root" data-screen-label="LI.FI Marketing"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="StatsBand.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="ChainsGrid.jsx"></script>
<script type="text/babel" src="DevCards.jsx"></script>
<script type="text/babel" src="EnterpriseGrid.jsx"></script>
<script type="text/babel" src="PartnerQuote.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <>
      <Nav/>
      <Hero/>
      <StatsBand/>
      <ChainsGrid/>
      <DevCards/>
      <EnterpriseGrid/>
      <PartnerQuote/>
      <Footer/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// Wait for fonts + React render, then print.
(async () => {
  try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch(e){}
  setTimeout(() => { window.print(); }, 1200);
})();
</script>
</body>
</html>
