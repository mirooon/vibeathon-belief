<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Belief — Will France win the 2026 FIFA World Cup?</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body {
    margin:0; background:#000; color:#F4F4F5;
    font-family: var(--font-body);
    min-height:100vh;
  }
  * { box-sizing: border-box; }
  a { color: inherit; }

  /* Ambient halo — LI.FI signature pink+blue radial, very subtle */
  .halo {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 900px 500px at 20% -10%, rgba(247,194,255,.10), transparent 60%),
      radial-gradient(ellipse 900px 500px at 85% 15%, rgba(92,103,255,.12), transparent 60%);
  }

  /* Page layout: 7:5 on desktop, stacks on mobile */
  .page-grid {
    max-width: 1400px; margin: 0 auto; width: 100%;
    padding: 20px 32px 56px;
    display: grid;
    grid-template-columns: 1.35fr 1fr;
    gap: 20px;
    align-items: start;
  }
  .page-grid > .col-full { grid-column: 1 / -1; }

  @media (max-width: 1080px) {
    .page-grid { grid-template-columns: 1fr; padding: 12px 16px 40px; }
  }

  /* no spinner on number input */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
  input[type=number] { -moz-appearance: textfield; }

  ::selection { background: rgba(247,194,255,0.25); }
</style>
</head>
<body>
  <div class="halo"></div>
  <div id="root" data-screen-label="01 Market · France WC 2026" style="position:relative;z-index:1"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="market_data.jsx"></script>
  <script type="text/babel" src="Shell.jsx"></script>
  <script type="text/babel" src="ChartPane.jsx"></script>
  <script type="text/babel" src="TradePane.jsx"></script>
  <script type="text/babel" src="VenuePane.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <div>
          <BeliefTopBar/>
          <MarketHeader/>
          <div className="page-grid">
            <div><ChartPane/></div>
            <div><TradePane/></div>
            <div className="col-full"><VenuePane/></div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
