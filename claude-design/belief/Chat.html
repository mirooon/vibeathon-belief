<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Belief — Ask</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body { margin:0; background:#000; color:#F4F4F5; font-family: var(--font-body); min-height:100vh; }
  * { box-sizing: border-box; }
  .halo {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 800px 500px at 50% -5%, rgba(247,194,255,.10), transparent 60%),
      radial-gradient(ellipse 900px 600px at 50% 20%, rgba(92,103,255,.10), transparent 65%);
  }
  ::selection { background: rgba(247,194,255,0.25); }
</style>
</head>
<body>
  <div class="halo"></div>
  <div id="root" data-screen-label="Chat · Empty state" style="position:relative;z-index:1"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ChatEmpty.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <div>
          <BeliefTopBarChat/>
          <ChatEmpty/>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
