<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Belief — Login modal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body { margin:0; background:#000; color:#F4F4F5; font-family: var(--font-body); min-height:100vh; }
  * { box-sizing: border-box; }
  .halo {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 900px 500px at 20% -10%, rgba(247,194,255,.08), transparent 60%),
      radial-gradient(ellipse 900px 500px at 85% 15%, rgba(92,103,255,.10), transparent 60%);
  }
  .demo-stage {
    position: relative; z-index: 1; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 20px; gap: 20px; text-align: center;
  }
</style>
</head>
<body>
  <div class="halo"></div>
  <div id="root" data-screen-label="Login modal"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="LoginModal.jsx"></script>

  <script type="text/babel">
    const { useState } = React;
    function Demo() {
      const [open, setOpen] = useState(true);
      return (
        <div className="demo-stage">
          <div className="eyebrow">privy / auth</div>
          <h1 style={{
            fontSize:'clamp(28px,4vw,44px)', fontWeight:500, letterSpacing:'-0.025em',
            margin:'8px 0 0', color:'#F4F4F5', maxWidth:640,
          }}>Log in to Belief</h1>
          <p style={{color:'#8A8A94', maxWidth:520, margin:'6px auto 0', fontSize:14, lineHeight:1.5}}>
            Bimodal modal — email-first for casuals, wallets below the divider for crypto-natives.
          </p>
          <button onClick={() => setOpen(true)} style={{
            marginTop:8, background:'linear-gradient(135deg,#F7C2FF,#5C67FF)',
            color:'#0A0A0B', border:0, borderRadius:12, padding:'12px 20px',
            fontFamily:'inherit', fontSize:14, fontWeight:600, cursor:'pointer',
            boxShadow:'0 0 40px rgba(92,103,255,0.25)',
          }}>Open login modal</button>
          <LoginModal open={open} onClose={() => setOpen(false)} />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
