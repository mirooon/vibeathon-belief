<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#000;padding:0;font-family:var(--font-body);color:#F4F4F5}
  .logos{display:grid;grid-template-columns:repeat(3,1fr);gap:0}
  .cell{padding:20px;display:flex;align-items:center;justify-content:center;min-height:90px;border:1px solid #121214}
  .cell.light{background:#F4F4F5}
  .cell svg{height:32px;width:auto}
</style></head>
<body>
  <div class="logos">
    <div class="cell"><img src="../assets/logo_lifi_dark_horizontal.svg" height="32"></div>
    <div class="cell"><img src="../assets/logo_lifi_dark_vertical.svg" height="48"></div>
    <div class="cell"><img src="../assets/logo_lifi_dark.svg" height="40"></div>
    <div class="cell light"><img src="../assets/logo_lifi_light_horizontal.svg" height="32"></div>
    <div class="cell light"><img src="../assets/logo_lifi_light_vertical.svg" height="48"></div>
    <div class="cell light"><img src="../assets/logo_lifi_light.svg" height="40"></div>
  </div>
</body></html>
