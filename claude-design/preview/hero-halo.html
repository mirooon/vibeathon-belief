<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#000;padding:28px;font-family:var(--font-body);color:#F4F4F5}
  .hero{position:relative;border-radius:16px;padding:36px 28px;overflow:hidden;border:1px solid #1A1A1D;background:#000}
  .hero::before{content:"";position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:600px;height:300px;background:radial-gradient(circle,rgba(247,194,255,.28),transparent 60%);pointer-events:none}
  .hero::after{content:"";position:absolute;top:-80px;left:60%;width:500px;height:280px;background:radial-gradient(circle,rgba(92,103,255,.32),transparent 60%);pointer-events:none}
  .eye{font-family:var(--font-mono);font-size:12px;color:#8A8A94;position:relative;z-index:1}
  .eye::before{content:"//";color:#F7C2FF;margin-right:2px}
  h2{margin:12px 0 0;font-size:38px;font-weight:500;letter-spacing:-.03em;line-height:1.05;position:relative;z-index:1;max-width:560px}
  .grad{background:linear-gradient(135deg,#F7C2FF,#5C67FF);-webkit-background-clip:text;background-clip:text;color:transparent}
</style></head>
<body>
  <div class="hero">
    <span class="eye">signature_hero</span>
    <h2>Universal market access for <span class="grad">digital assets</span>.</h2>
  </div>
</body></html>
