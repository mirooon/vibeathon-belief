<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#000;padding:20px;font-family:var(--font-body);color:#F4F4F5}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .chain{display:flex;align-items:center;gap:8px;background:#1A1A1D;border:1px solid #3A3A40;border-radius:999px;padding:6px 12px 6px 6px;font-size:13px}
  .dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700}
  .cap{font-family:var(--font-mono);font-size:10px;color:#8A8A94;margin-top:10px;display:block}
</style></head>
<body>
  <div class="row">
    <span class="chain"><span class="dot" style="background:#627EEA">Ξ</span>Ethereum</span>
    <span class="chain"><span class="dot" style="background:linear-gradient(135deg,#9945FF,#14F195)">◎</span>Solana</span>
    <span class="chain"><span class="dot" style="background:#28A0F0">AR</span>Arbitrum</span>
    <span class="chain"><span class="dot" style="background:#0052FF">B</span>Base</span>
    <span class="chain"><span class="dot" style="background:#E84142">A</span>Avalanche</span>
    <span class="chain"><span class="dot" style="background:#F3BA2F">B</span>BNB</span>
    <span class="chain"><span class="dot" style="background:#8247E5">P</span>Polygon</span>
    <span class="chain"><span class="dot" style="background:#FF0420">OP</span>Optimism</span>
  </div>
  <span class="cap">placeholder chain chips — swap SVGs into assets/chains/ for pixel-perfect</span>
</body></html>
