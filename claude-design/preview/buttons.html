<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);padding:28px;font-family:var(--font-body)}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  button{font-family:inherit;font-size:14px;font-weight:500;border-radius:8px;padding:10px 18px;cursor:pointer;border:1px solid transparent;transition:all .15s cubic-bezier(.2,.8,.2,1)}
  .primary{background:#fff;color:#000;border-color:#fff}
  .primary:hover{background:#D8D8DC}
  .secondary{background:transparent;color:#F4F4F5;border-color:#3A3A40}
  .secondary:hover{border-color:#F7C2FF;background:rgba(247,194,255,.08)}
  .accent{background:linear-gradient(135deg,#F7C2FF,#5C67FF);color:#0A0A0B;border:none;box-shadow:0 0 40px rgba(92,103,255,.3)}
  .ghost{background:transparent;color:#B4B4BD;border:none;padding:10px 14px}
  .ghost:hover{color:#F4F4F5}
  .sm{font-size:12px;padding:6px 12px}
</style></head>
<body>
  <div class="row" style="margin-bottom:14px">
    <button class="primary">Start your integration</button>
    <button class="secondary">Contact sales</button>
    <button class="accent">Get started →</button>
    <button class="ghost">Learn more →</button>
  </div>
  <div class="row">
    <button class="primary sm">Connect</button>
    <button class="secondary sm">0x7a2f…9c1e</button>
    <button class="secondary sm">Ethereum ▾</button>
  </div>
</body></html>
