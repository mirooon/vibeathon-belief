<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);padding:24px;font-family:var(--font-body);color:#F4F4F5}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .pill{border-radius:999px;padding:5px 12px;font-size:12px;display:inline-flex;align-items:center;gap:6px;border:1px solid transparent;font-family:var(--font-body)}
  .dot{width:6px;height:6px;border-radius:50%}
  .tag{background:#1A1A1D;border-color:#3A3A40;color:#F4F4F5}
  .ok{background:rgba(52,211,153,.12);color:#34D399;border-color:rgba(52,211,153,.3)}
  .warn{background:rgba(251,191,36,.12);color:#FBBF24;border-color:rgba(251,191,36,.3)}
  .err{background:rgba(248,113,113,.12);color:#F87171;border-color:rgba(248,113,113,.3)}
  .pink{background:rgba(247,194,255,.14);color:#F7C2FF;border-color:rgba(247,194,255,.3)}
  .blue{background:rgba(92,103,255,.14);color:#5C67FF;border-color:rgba(92,103,255,.35)}
  .upper{text-transform:uppercase;letter-spacing:.08em;font-size:10px;font-weight:600;padding:4px 10px}
</style></head>
<body>
  <div class="row" style="margin-bottom:12px">
    <span class="pill tag">Ethereum</span>
    <span class="pill tag">Solana</span>
    <span class="pill tag">Arbitrum</span>
    <span class="pill tag">Base</span>
    <span class="pill tag">+ 56 more</span>
  </div>
  <div class="row">
    <span class="pill ok"><span class="dot" style="background:#34D399"></span>Best route</span>
    <span class="pill warn"><span class="dot" style="background:#FBBF24"></span>High slippage</span>
    <span class="pill err"><span class="dot" style="background:#F87171"></span>Failed</span>
    <span class="pill pink upper">Free to integrate</span>
    <span class="pill blue upper">Self-custody wallet</span>
  </div>
</body></html>
