<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);padding:24px;font-family:var(--font-body);color:#F4F4F5}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:#1A1A1D;border:1px solid #26262A;border-radius:16px;padding:18px;transition:all .2s cubic-bezier(.2,.8,.2,1)}
  .card:hover{border-color:#3A3A40;box-shadow:0 0 40px rgba(247,194,255,.12)}
  .eye{font-family:var(--font-mono);font-size:11px;color:#8A8A94;letter-spacing:.02em;margin-bottom:10px}
  .eye::before{content:"//";color:#F7C2FF;margin-right:2px}
  .stat{font-size:34px;font-weight:500;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums}
  .label{font-size:12px;color:#8A8A94;margin-top:6px}
  h4{margin:0 0 6px;font-size:15px;font-weight:500;letter-spacing:-.01em}
  p{margin:0;font-size:13px;color:#B4B4BD;line-height:1.45}
</style></head>
<body>
  <div class="grid">
    <div class="card">
      <div class="eye">by_the_numbers</div>
      <div class="stat">$80B+</div>
      <div class="label">Total transfer volume</div>
    </div>
    <div class="card">
      <h4>Trading widget</h4>
      <p>Enable trading on your app in less than 5 minutes. →</p>
    </div>
  </div>
</body></html>
