<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);padding:24px}
  .wrap{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
  .box{background:#F7C2FF;display:flex;align-items:flex-end;justify-content:center;color:#0A0A0B;font-family:var(--font-mono);font-size:10px;padding-bottom:3px;border-radius:2px}
  .cap{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:6px;text-align:center;display:block}
</style></head>
<body><div class="wrap">
  <div><div class="box" style="width:4px;height:24px"></div><span class="cap">1<br>4px</span></div>
  <div><div class="box" style="width:8px;height:24px"></div><span class="cap">2<br>8</span></div>
  <div><div class="box" style="width:12px;height:24px"></div><span class="cap">3<br>12</span></div>
  <div><div class="box" style="width:16px;height:32px"></div><span class="cap">4<br>16</span></div>
  <div><div class="box" style="width:20px;height:32px"></div><span class="cap">5<br>20</span></div>
  <div><div class="box" style="width:24px;height:40px"></div><span class="cap">6<br>24</span></div>
  <div><div class="box" style="width:32px;height:48px"></div><span class="cap">8<br>32</span></div>
  <div><div class="box" style="width:40px;height:56px"></div><span class="cap">10<br>40</span></div>
  <div><div class="box" style="width:48px;height:64px"></div><span class="cap">12<br>48</span></div>
  <div><div class="box" style="width:64px;height:72px"></div><span class="cap">16<br>64</span></div>
</div></body></html>
