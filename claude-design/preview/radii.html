<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);padding:24px}
  .wrap{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .box{background:#1A1A1D;border:1px solid #3A3A40;width:76px;height:76px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
  .name{font-size:11px;font-weight:500}
  .val{font-family:var(--font-mono);font-size:10px;color:var(--fg-3)}
</style></head>
<body><div class="wrap">
  <div class="box" style="border-radius:4px"><span class="name">xs</span><span class="val">4</span></div>
  <div class="box" style="border-radius:8px"><span class="name">sm</span><span class="val">8</span></div>
  <div class="box" style="border-radius:12px"><span class="name">md</span><span class="val">12</span></div>
  <div class="box" style="border-radius:16px"><span class="name">lg</span><span class="val">16</span></div>
  <div class="box" style="border-radius:24px"><span class="name">xl</span><span class="val">24</span></div>
  <div class="box" style="border-radius:32px"><span class="name">2xl</span><span class="val">32</span></div>
  <div class="box" style="border-radius:999px"><span class="name">pill</span><span class="val">999</span></div>
</div></body></html>
