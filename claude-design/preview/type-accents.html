<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);padding:28px}
  .row{display:flex;align-items:center;gap:18px;padding:12px 0;border-bottom:1px solid var(--border-subtle)}
  .row:last-child{border:none}
  .label{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);width:110px;flex-shrink:0}
  .eye{font-family:var(--font-mono);font-size:13px;font-weight:500;color:var(--fg-3);letter-spacing:.02em}
  .eye::before{content:"//";color:#F7C2FF;margin-right:2px}
  .grad{font-family:'GT America','Helvetica Neue',sans-serif;font-size:40px;font-weight:500;letter-spacing:-.03em;background:linear-gradient(135deg,#F7C2FF,#5C67FF);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1}
  code{font-family:var(--font-mono);font-size:13px;color:#F7C2FF;background:#1A1A1D;padding:3px 8px;border-radius:6px}
  .ital{font-style:italic;font-weight:500;font-size:22px}
</style></head>
<body>
  <div class="row"><span class="label">eyebrow</span><span class="eye">for_developers</span></div>
  <div class="row"><span class="label">gradient</span><span class="grad">Linked finance</span></div>
  <div class="row"><span class="label">italic</span><span class="ital">Linked finance — the everything exchange.</span></div>
  <div class="row"><span class="label">mono code</span><code>GET /v1/quote</code></div>
</body></html>
