<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);padding:28px}
  .wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .el{height:70px;border-radius:16px;background:#1A1A1D;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--fg-2);font-family:var(--font-mono)}
</style></head>
<body><div class="wrap">
  <div class="el" style="box-shadow:0 1px 2px rgba(0,0,0,.4)">shadow-sm</div>
  <div class="el" style="box-shadow:0 4px 16px rgba(0,0,0,.35)">shadow-md</div>
  <div class="el" style="box-shadow:0 12px 40px rgba(0,0,0,.45)">shadow-lg</div>
  <div class="el" style="box-shadow:0 24px 80px rgba(0,0,0,.55)">shadow-xl</div>
  <div class="el" style="box-shadow:0 0 40px rgba(247,194,255,.35);border:1px solid #3A3A40">glow-pink</div>
  <div class="el" style="box-shadow:0 0 40px rgba(92,103,255,.45);border:1px solid #3A3A40">glow-blue</div>
  <div class="el" style="border:1px solid #26262A">border-subtle</div>
  <div class="el" style="border:1px solid #3A3A40">border-default</div>
</div></body></html>
