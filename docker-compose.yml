services:
  mongodb:
    image: mongo:7.0.14
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - vibeahack

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    restart: unless-stopped
    volumes:
      - ./backend/src:/app/backend/src
    environment:
      MONGO_URL: mongodb://mongodb:27017/vibeahack
      NODE_ENV: development
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/v1/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - vibeahack

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    restart: unless-stopped
    volumes:
      - ./frontend/src:/app/frontend/src
    environment:
      VITE_API_URL: http://localhost:3000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vibeahack

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
      target: development
    restart: unless-stopped
    volumes:
      - ./worker/src:/app/worker/src
    environment:
      MONGO_URL: mongodb://mongodb:27017/vibeahack
      NODE_ENV: development
      MARKET_SYNC_CRON: "*/15 * * * *"
      ORDERBOOK_SYNC_CRON: "*/2 * * * *"
      PRICE_SYNC_CRON: "0 * * * *"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - vibeahack

  mongo-express:
    image: mongo-express:1.0.2
    profiles: ["dev"]
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - vibeahack

volumes:
  mongodb_data:

networks:
  vibeahack:
    driver: bridge
